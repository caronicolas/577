name: Ingestion Production

on:
  workflow_dispatch:
    inputs:
      scripts:
        description: "Scripts à exécuter (organes deputes datan agenda)"
        required: false
        default: "organes deputes"

jobs:
  get-db-url:
    name: Récupérer l'URL DB depuis Terraform
    runs-on: ubuntu-latest
    outputs:
      db_url: ${{ steps.db-url.outputs.db_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get connection URL from Terraform state
        id: db-url
        working-directory: infra
        env:
          TF_VAR_scw_access_key: ${{ secrets.SCW_ACCESS_KEY }}
          TF_VAR_scw_secret_key: ${{ secrets.SCW_SECRET_KEY }}
          TF_VAR_scw_project_id: ${{ secrets.SCW_PROJECT_ID }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.SCW_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.SCW_SECRET_KEY }}"
          DB_URL=$(terraform output -raw database_connection_url)
          echo "::add-mask::$DB_URL"
          echo "db_url=$DB_URL" >> "$GITHUB_OUTPUT"

  ingest:
    name: Lancer ingestion sur production
    needs: get-db-url
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: organes.py
        if: contains(github.event.inputs.scripts, 'organes')
        run: python -m ingestion.assemblee.organes
        env:
          DATABASE_URL: ${{ needs.get-db-url.outputs.db_url }}

      - name: deputes.py
        if: contains(github.event.inputs.scripts, 'deputes')
        run: python -m ingestion.assemblee.deputes
        env:
          DATABASE_URL: ${{ needs.get-db-url.outputs.db_url }}

      - name: datan.py
        if: contains(github.event.inputs.scripts, 'datan')
        run: python -m ingestion.gouv.datan
        env:
          DATABASE_URL: ${{ needs.get-db-url.outputs.db_url }}

      - name: agenda.py
        if: contains(github.event.inputs.scripts, 'agenda')
        run: python -m ingestion.assemblee.agenda
        env:
          DATABASE_URL: ${{ needs.get-db-url.outputs.db_url }}
