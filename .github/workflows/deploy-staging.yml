name: Deploy Staging

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

env:
  REGISTRY: rg.fr-par.scw.cloud
  IMAGE_NAME: an577/api

jobs:
  # ---------------------------------------------------------------------------
  # Nettoyage à la fermeture d'une PR
  # ---------------------------------------------------------------------------

  cleanup-pr-staging:
    name: Cleanup PR Staging
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Delete PR bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          AWS_DEFAULT_REGION: fr-par
        run: |
          BUCKET="pr-${{ github.event.number }}.les577.fr"
          aws s3 rb "s3://$BUCKET" --force \
            --endpoint-url https://s3.fr-par.scw.cloud \
            || echo "Bucket $BUCKET inexistant ou déjà supprimé."

      - name: Comment PR — staging supprimé
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Staging déployé')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: '## Staging supprimé\n\nL\'environnement de staging pour cette PR a été nettoyé.',
              });
            }

  # ---------------------------------------------------------------------------
  # Pipeline principal (ouverture / mise à jour / workflow_dispatch)
  # ---------------------------------------------------------------------------

  test:
    name: Lint & Tests
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: les577_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Tests
        run: pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/les577_test

  build-push:
    name: Build & Push Docker
    if: github.event.action != 'closed'
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Login Scaleway Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=staging-,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy-staging:
    name: Deploy Staging Infrastructure
    if: github.event.action != 'closed'
    needs: build-push
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.tf-output.outputs.api_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init (staging)
        working-directory: infra/staging
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.SCW_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.SCW_SECRET_KEY }}"

      - name: Terraform Apply (staging)
        working-directory: infra/staging
        env:
          TF_VAR_scw_access_key: ${{ secrets.SCW_ACCESS_KEY }}
          TF_VAR_scw_secret_key: ${{ secrets.SCW_SECRET_KEY }}
          TF_VAR_scw_project_id: ${{ secrets.SCW_PROJECT_ID }}
          TF_VAR_db_staging_password: ${{ secrets.DB_STAGING_PASSWORD }}
          TF_VAR_database_url_staging: ${{ secrets.DATABASE_URL_STAGING }}
          TF_VAR_api_image_tag: ${{ needs.build-push.outputs.image_tag }}
        run: terraform apply -auto-approve

      - name: Capture API URL
        id: tf-output
        working-directory: infra/staging
        run: |
          API_URL=$(terraform output -raw api_url 2>/dev/null)
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

  migrate-staging:
    name: Run Alembic Migrations (staging)
    if: github.event.action != 'closed'
    needs: deploy-staging
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: alembic upgrade head
        run: alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}

  deploy-frontend-staging:
    name: Deploy Frontend Staging
    if: github.event.action != 'closed'
    needs: [deploy-staging, migrate-staging]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Determine bucket name
        id: bucket
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=pr-${{ github.event.number }}.les577.fr" >> "$GITHUB_OUTPUT"
            echo "url=https://pr-${{ github.event.number }}.les577.fr" >> "$GITHUB_OUTPUT"
          else
            echo "name=test.les577.fr" >> "$GITHUB_OUTPUT"
            echo "url=https://test.les577.fr" >> "$GITHUB_OUTPUT"
          fi

      - name: Create & configure bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          AWS_DEFAULT_REGION: fr-par
          BUCKET: ${{ steps.bucket.outputs.name }}
        run: |
          aws s3api create-bucket \
            --bucket "$BUCKET" \
            --endpoint-url https://s3.fr-par.scw.cloud \
            || echo "Bucket déjà existant."

          aws s3api put-bucket-website \
            --bucket "$BUCKET" \
            --endpoint-url https://s3.fr-par.scw.cloud \
            --website-configuration '{"IndexDocument":{"Suffix":"index.html"},"ErrorDocument":{"Key":"index.html"}}'

          aws s3api put-bucket-policy \
            --bucket "$BUCKET" \
            --endpoint-url https://s3.fr-par.scw.cloud \
            --policy "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Sid\":\"PublicRead\",\"Effect\":\"Allow\",\"Principal\":\"*\",\"Action\":\"s3:GetObject\",\"Resource\":\"$BUCKET/*\"}]}"

      - name: Build (staging)
        run: npm run build
        env:
          PUBLIC_API_BASE_URL: https://${{ needs.deploy-staging.outputs.api_url }}

      - name: Deploy to Scaleway Object Storage
        uses: jakejarvis/s3-sync-action@v0.5.1
        with:
          args: --delete --cache-control "public,max-age=0,must-revalidate"
        env:
          AWS_S3_BUCKET: ${{ steps.bucket.outputs.name }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          AWS_S3_ENDPOINT: https://s3.fr-par.scw.cloud
          SOURCE_DIR: frontend/build

      - name: Comment PR with staging URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const apiUrl = '${{ needs.deploy-staging.outputs.api_url }}';
            const frontendUrl = '${{ steps.bucket.outputs.url }}';
            const body = [
              '## Staging déployé',
              '',
              `**Frontend** : [${frontendUrl}](${frontendUrl})`,
              `**API** : https://${apiUrl}/docs`,
              '',
              '_Ce commentaire est mis à jour à chaque push sur cette PR._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Staging déployé')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
