name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  REGISTRY: rg.fr-par.scw.cloud
  IMAGE_NAME: an577/api

jobs:
  test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: les577_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Tests
        run: pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/les577_test

  build-push:
    name: Build & Push Docker
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Login Scaleway Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  migrate:
    name: Run Alembic Migrations (production)
    needs: build-push
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Diagnose DATABASE_URL format
        run: |
          python - <<'EOF'
          import os
          url = os.environ.get("DATABASE_URL", "")
          scheme = url.split("://")[0] if "://" in url else "NO_SCHEME"
          print(f"URL length: {len(url)}")
          print(f"URL scheme: {scheme}")
          EOF
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: alembic upgrade head
        run: |
          python - <<'EOF'
          import os, re
          from alembic.config import Config
          from alembic import command
          url = os.environ["DATABASE_URL"]
          # Normalise postgres:// → postgresql+asyncpg://
          url = re.sub(r"^postgres(ql)?://", "postgresql+asyncpg://", url)
          cfg = Config("alembic.ini")
          cfg.set_main_option("sqlalchemy.url", url.replace("%", "%%"))
          command.upgrade(cfg, "head")
          EOF
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    name: Deploy Container Scaleway
    needs: [build-push, migrate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build ZIPs (requis par filesha256 dans module.functions)
        run: bash backend/ingestion/build_functions.sh

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform apply
        working-directory: infra
        env:
          TF_VAR_scw_access_key: ${{ secrets.SCW_ACCESS_KEY }}
          TF_VAR_scw_secret_key: ${{ secrets.SCW_SECRET_KEY }}
          TF_VAR_scw_project_id: ${{ secrets.SCW_PROJECT_ID }}
          TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_api_image_tag: ${{ needs.build-push.outputs.image_tag }}
          TF_VAR_bsky_identifier: ${{ secrets.BSKY_IDENTIFIER }}
          TF_VAR_bsky_app_password: ${{ secrets.BSKY_APP_PASSWORD }}
        run: |
          terraform init -backend-config="access_key=${{ secrets.SCW_ACCESS_KEY }}" \
                         -backend-config="secret_key=${{ secrets.SCW_SECRET_KEY }}"
          terraform apply -auto-approve -target=module.containers
