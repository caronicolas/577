name: Ingestion Staging

on:
  workflow_dispatch:
    inputs:
      scripts:
        description: "Scripts à exécuter"
        required: false
        default: "organes agenda"

jobs:
  ingest:
    name: Lancer ingestion sur staging
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: organes.py
        if: contains(github.event.inputs.scripts, 'organes')
        run: python -m ingestion.assemblee.organes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}

      - name: agenda.py
        if: contains(github.event.inputs.scripts, 'agenda')
        run: python -m ingestion.assemblee.agenda
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
