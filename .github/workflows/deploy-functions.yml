name: Deploy Ingestion Functions

on:
  push:
    branches: [main]
    paths:
      - 'backend/ingestion/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  build-deploy:
    name: Build ZIPs & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # -- Build ZIPs via le script de packaging --------------------------------
      - name: Build ZIPs
        run: bash backend/ingestion/build_functions.sh

      # -- Terraform apply module functions -----------------------------------
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.SCW_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.SCW_SECRET_KEY }}"

      - name: Terraform Apply (functions only)
        working-directory: infra
        env:
          TF_VAR_scw_access_key: ${{ secrets.SCW_ACCESS_KEY }}
          TF_VAR_scw_secret_key: ${{ secrets.SCW_SECRET_KEY }}
          TF_VAR_scw_project_id: ${{ secrets.SCW_PROJECT_ID }}
          TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
        run: terraform apply -auto-approve -target=module.functions
