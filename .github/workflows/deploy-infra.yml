name: Deploy Infrastructure

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infra.yml'
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build ZIPs functions
        working-directory: .
        run: bash backend/ingestion/build_functions.sh

      - name: Compute ZIP hashes
        run: |
          HASHES="{"
          for name in scrutins organes deputes agenda amendements prises_de_parole post_agenda post_commissions datan post_scrutins post_stats_hebdo; do
            hash=$(sha256sum "infra/functions/${name}.zip" | awk '{print $1}')
            HASHES="${HASHES}\"${name}\":\"${hash}\","
          done
          HASHES="${HASHES%,}}"
          echo "TF_VAR_zip_hashes=$HASHES" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        env:
          TF_VAR_scw_access_key: ${{ secrets.SCW_ACCESS_KEY }}
          TF_VAR_scw_secret_key: ${{ secrets.SCW_SECRET_KEY }}
        run: |
          terraform init -backend-config="access_key=${{ secrets.SCW_ACCESS_KEY }}" \
                         -backend-config="secret_key=${{ secrets.SCW_SECRET_KEY }}"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Plan
        env:
          TF_VAR_scw_access_key: ${{ secrets.SCW_ACCESS_KEY }}
          TF_VAR_scw_secret_key: ${{ secrets.SCW_SECRET_KEY }}
          TF_VAR_scw_project_id: ${{ secrets.SCW_PROJECT_ID }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_bsky_identifier: ${{ secrets.BSKY_IDENTIFIER }}
          TF_VAR_bsky_app_password: ${{ secrets.BSKY_APP_PASSWORD }}
          TF_VAR_zip_hashes: ${{ env.TF_VAR_zip_hashes }}
        run: |
          terraform plan -out=tfplan \
            -target=module.database \
            -target=module.containers \
            -target=module.functions \
            -target=module.frontend

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/tfplan

  apply:
    name: Terraform Apply
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build ZIPs functions
        working-directory: .
        run: bash backend/ingestion/build_functions.sh

      - name: Compute ZIP hashes
        run: |
          HASHES="{"
          for name in scrutins organes deputes agenda amendements prises_de_parole post_agenda post_commissions datan post_scrutins post_stats_hebdo; do
            hash=$(sha256sum "infra/functions/${name}.zip" | awk '{print $1}')
            HASHES="${HASHES}\"${name}\":\"${hash}\","
          done
          HASHES="${HASHES%,}}"
          echo "TF_VAR_zip_hashes=$HASHES" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v4

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infra

      - name: Terraform Init
        run: |
          terraform init -backend-config="access_key=${{ secrets.SCW_ACCESS_KEY }}" \
                         -backend-config="secret_key=${{ secrets.SCW_SECRET_KEY }}"

      - name: Terraform Apply
        env:
          TF_VAR_scw_access_key: ${{ secrets.SCW_ACCESS_KEY }}
          TF_VAR_scw_secret_key: ${{ secrets.SCW_SECRET_KEY }}
          TF_VAR_scw_project_id: ${{ secrets.SCW_PROJECT_ID }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_bsky_identifier: ${{ secrets.BSKY_IDENTIFIER }}
          TF_VAR_bsky_app_password: ${{ secrets.BSKY_APP_PASSWORD }}
          TF_VAR_zip_hashes: ${{ env.TF_VAR_zip_hashes }}
        run: terraform apply tfplan
